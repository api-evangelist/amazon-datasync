openapi: 3.1.0
info:
  title: 'Amazon DataSync REST Amazon DataSync REST API #StartTaskExecution API'
  description: AWS DataSync is an online data transfer service that simplifies, automates, and accelerates moving data between on-premises storage systems and AWS storage services. This API enables management of transfer tasks, source and destination locations, agents, and task executions.
  version: '2018-11-09'
  contact:
    name: AWS Support
    url: https://aws.amazon.com/premiumsupport/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://aws.amazon.com/service-terms/
  x-logo:
    url: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
servers:
- url: https://datasync.{region}.amazonaws.com
  description: Amazon DataSync regional endpoint
  variables:
    region:
      default: us-east-1
      description: AWS region
      enum:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - eu-west-1
      - eu-west-2
      - eu-central-1
      - ap-northeast-1
      - ap-southeast-1
      - ap-southeast-2
      - ap-south-1
      - sa-east-1
security:
- sigv4: []
tags:
- name: '#StartTaskExecution'
paths:
  /#StartTaskExecution:
    post:
      summary: Amazon DataSync Start Task Execution
      description: Starts an existing DataSync task. By starting a task, you tell DataSync to immediately begin transferring data.
      operationId: startTaskExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              $ref: '#/components/schemas/StartTaskExecutionRequest'
      responses:
        '200':
          description: Successful response
      x-amz-target: FmrsService.StartTaskExecution
      tags:
      - '#StartTaskExecution'
components:
  schemas:
    StartTaskExecutionRequest:
      type: object
      required:
      - TaskArn
      properties:
        TaskArn:
          type: string
  securitySchemes:
    sigv4:
      type: apiKey
      name: Authorization
      in: header
      description: AWS Signature Version 4
externalDocs:
  description: Amazon DataSync API Reference
  url: https://docs.aws.amazon.com/datasync/latest/userguide/API_Reference.html
