naftiko: 1.0.0-alpha2
info:
  label: Amazon DataSync REST API
  description: 'Amazon DataSync REST API. 1 operations. Lead operation: Amazon DataSync Create Task. Self-contained Naftiko
    capability covering one Amazon Datasync business surface.'
  tags:
  - Amazon Datasync
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_DATASYNC_API_KEY: AMAZON_DATASYNC_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-datasync-general
    baseUri: https://datasync.{region}.amazonaws.com
    description: Amazon DataSync REST API business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: createtask
        method: POST
        description: Amazon DataSync Create Task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_DATASYNC_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amazon-datasync-general-rest
    port: 8080
    description: REST adapter for Amazon DataSync REST API. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: createtask
        description: Amazon DataSync Create Task
        call: amazon-datasync-general.createtask
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-datasync-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon DataSync REST API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-datasync-create-task
      description: Amazon DataSync Create Task
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-datasync-general.createtask
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
