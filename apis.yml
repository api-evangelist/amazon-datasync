  - type: Features
    data:
      - name: High-Speed Data Transfer
        description: >-
          Transfer data at speeds up to 10 times faster than open-source tools
          using purpose-built multi-threaded network protocol over TLS.
      - name: Multi-Protocol Support
        description: >-
          Connect to NFS, SMB, HDFS, Amazon S3, Amazon EFS, FSx for Windows,
          FSx for Lustre, and FSx for NetApp ONTAP as transfer endpoints.
      - name: Automated Data Validation
        description: >-
          Automatically verify data integrity using checksums at both source and
          destination to ensure byte-for-byte data consistency after transfer.
      - name: Scheduled Transfers
        description: >-
          Configure recurring scheduled transfers on hourly, daily, or weekly
          cadences for ongoing data synchronization between systems.
      - name: On-Premises Agent
        description: >-
          Deploy the DataSync agent VM on-premises to connect local NFS and SMB
          storage to AWS without opening inbound firewall ports.
      - name: Bandwidth Throttling
        description: >-
          Control the network bandwidth consumed by DataSync transfers to
          minimize impact on production workloads during business hours.
      - name: CloudWatch Integration
        description: >-
          Monitor transfer metrics, task execution history, and set up alarms
          for failed transfers using Amazon CloudWatch.
  - type: UseCases
    data:
      - name: Data Center Migration
        description: >-
          Migrate petabytes of data from on-premises NAS and SAN systems to
          Amazon S3 or EFS during cloud adoption and data center exit projects.
      - name: Ongoing Hybrid Synchronization
        description: >-
          Keep on-premises and cloud storage in sync on a scheduled basis for
          hybrid cloud architectures and distributed workloads.
      - name: Backup and Archive to Cloud
        description: >-
          Transfer on-premises file data to Amazon S3 Glacier for cost-effective
          long-term archival and backup storage.
      - name: Data Distribution
        description: >-
          Transfer datasets between AWS Regions or across AWS accounts for
          data sharing, disaster recovery, or multi-region analytics.
      - name: HPC Data Staging
        description: >-
          Stage large datasets from S3 or on-premises storage to FSx for Lustre
          for high-performance computing workloads on AWS.
  - type: Integrations
    data:
      - name: Amazon S3
        description: >-
          Primary cloud storage destination supporting all S3 storage classes
          including Glacier for cost-effective data archival.
      - name: Amazon EFS
        description: >-
          Transfer data to and from Amazon Elastic File System for shared file
          storage accessible from multiple EC2 instances.
      - name: Amazon FSx
        description: >-
          Integrate with FSx for Windows, FSx for Lustre, and FSx for NetApp
          ONTAP as high-performance managed file system destinations.
      - name: Amazon CloudWatch
        description: >-
          Receive DataSync task execution metrics, transfer rates, and error
          alerts in CloudWatch for monitoring and incident response.
      - name: AWS Snowball
        description: >-
          Use Snowball for initial bulk data transfer followed by DataSync
          for ongoing incremental synchronization after migration.
      - name: AWS Storage Gateway
        description: >-
          Combine Storage Gateway for cache-based hybrid access with DataSync
          for bulk data movement between on-premises and cloud.
