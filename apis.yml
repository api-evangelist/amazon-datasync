aid: amazon-datasync
name: Amazon DataSync
description: >-
  AWS DataSync is an online data transfer service that simplifies, automates,
  and accelerates moving data between on-premises storage systems, AWS storage
  services, and other cloud storage. DataSync can transfer data at speeds up to
  10 times faster than open-source tools by using purpose-built network protocol
  and parallel multi-threaded architecture. It supports NFS, SMB, HDFS, S3,
  EFS, FSx, and more as transfer endpoints.
