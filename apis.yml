name: Amazon DataSync API
description: AWS DataSync is an online data transfer service that simplifies, automates, and accelerates moving data between on-premises storage systems, AWS storage services, and other cloud storage. DataSync can transfer data at speeds up to 10 times faster than open-source tools.
image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
